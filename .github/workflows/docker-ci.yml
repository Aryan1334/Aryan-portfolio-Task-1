name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.0
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull yourusername/portfolio:latest
            docker stop portfolio || true
            docker rm portfolio || true
            docker run -d -p 80:80 --name portfolio yourusername/portfolio:latests